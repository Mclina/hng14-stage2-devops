services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - app_net

  api:
    build: ./api
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  app_net:
    driver: bridge
